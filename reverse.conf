server {
    listen 80;

    # Frontend (your web app)
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Backend API (Python)
    location /api/ {
        proxy_pass http://localhost:3001;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
